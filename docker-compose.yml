version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: detectiveai-db
    environment:
      POSTGRES_DB: detectiveai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (for future background task queue)
  redis:
    image: redis:7-alpine
    container_name: detectiveai-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: detectiveai-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/detectiveai
      SECRET_KEY: dev-secret-key-change-in-production-at-least-32-chars
      CORS_ORIGINS: '["http://localhost:3000"]'
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  redisdata:
  uploads:
